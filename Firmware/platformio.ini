; PlatformIO Project Configuration
; Compatible met Arduino IDE (Firmware.ino blijft ongewijzigd)
;
; VS Code + PlatformIO: Open deze map (Firmware/) als project
; Arduino IDE: Open Firmware.ino zoals gewoonlijk

[platformio]
src_dir = .

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Flash configuratie voor 4MB ESP32
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = default.csv

; Lokale src/ bestanden meenemen als source (niet als library)
build_src_filter = +<*> +<src/>

; Libraries
lib_deps =
    bblanchon/ArduinoJson@^6.21.2
    mikalhart/TinyGPSPlus@^1.0.3
    plerup/EspSoftwareSerial@^8.0.3
    dfrobot/DFRobot_SGP40@^1.0.3
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    https://github.com/Seithan/EasyNextionLibrary.git

; Build flags
build_flags =
    -DARDUINO_ARCH_ESP32
