; PlatformIO Project Configuration
; Compatible met Arduino IDE (Firmware.ino blijft ongewijzigd)
;
; VS Code + PlatformIO: Open deze map (Firmware/) als project
; Arduino IDE: Open Firmware.ino zoals gewoonlijk

[platformio]
src_dir = .

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Flash configuratie voor 4MB ESP32
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = default.csv

; Libraries uit de repo Libraries map
lib_extra_dirs = ../Libraries

; Build flags
build_flags =
    -DARDUINO_ARCH_ESP32
